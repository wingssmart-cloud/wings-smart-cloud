<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Wings Smart - Global Cloud</title>
    
    <!-- Link Logo & Mode Aplikasi -->
    <link rel="icon" href="https://flaticon.com">
    <link rel="apple-touch-icon" href="https://flaticon.com">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #0f172a; margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg { position: fixed; width: 200%; height: 200%; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); animation: rotate 20s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .glass { position: relative; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 40px; padding: 50px 30px; width: 85%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h2 { color: #fff; font-weight: 300; letter-spacing: 5px; margin: 0; }
        .status { color: #38bdf8; font-size: 10px; margin-bottom: 40px; letter-spacing: 2px; }
        .btn { width: 100%; padding: 25px; margin: 15px 0; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #94a3b8; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.5s; outline: none; }
        .btn.active { background: #38bdf8; color: #fff; box-shadow: 0 0 30px rgba(56,189,248,0.4); border: none; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="glass">
        <h2>WINGS</h2>
        <div class="status">CLOUD SYSTEM ONLINE</div>
        <button id="s1" class="btn" onclick="toggle(1)">LAMPU UTAMA</button>
        <button id="s2" class="btn" onclick="toggle(2)">LAMPU TERAS</button>
    </div>
    <script>
        const conf = { databaseURL: "https://firebasedatabase.app" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        db.ref('/').on('value', (s) => {
            const d = s.val();
            up(1, d.saklar1); up(2, d.saklar2);
        });
        function up(n, st) {
            const b = document.getElementById('s' + n);
            if(st) { b.classList.add('active'); b.innerText = "ON"; }
            else { b.classList.remove('active'); b.innerText = "OFF"; }
        }
        function toggle(n) {
            const r = db.ref('saklar' + n);
            r.once('value').then(s => r.set(!s.val()));
        }
    </script>
</body>
</html>
