<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wings Smart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Inter;
    background:linear-gradient(180deg,#00c6ff,#0072ff);
    color:#fff;
}

/* PAGE */
.page{
    display:none;
    padding:20px;
}
.active{display:block}

/* WEATHER */
.weather{
    border-radius:25px;
    padding:20px;
    background-size:cover;
    position:relative;
    overflow:hidden;
    z-index:1;
}
.weather::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.3);
    pointer-events:none; /* 🔥 FIX KLIK */
}
.weather-content{
    position:relative;
    z-index:2;
}
.temp{font-size:48px;font-weight:bold}

/* CARD */
.card{
    display:flex;
    gap:15px;
    margin-top:20px;
    position:relative;
    z-index:2;
}
.box{
    flex:1;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    text-align:center;
    cursor:pointer;
    transition:.2s;
}
.box:active{transform:scale(0.95)}
.box.active{
    background:#fff;
    color:#000;
}

/* SWITCH */
.switch{
    width:160px;
    height:160px;
    border-radius:50%;
    margin:120px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    background:#0a0f1c;
    transition:.3s;
}
.switch.on{
    color:#0ff;
    box-shadow:
        0 0 30px #00f7ff,
        0 0 80px #00f7ff;
}

/* NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:rgba(0,0,0,0.3);
    padding:15px;
    z-index:999; /* 🔥 FIX NAV */
}
.nav span{
    cursor:pointer;
}
.nav span:active{
    transform:scale(0.9);
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}
button{
    padding:10px;
    border:none;
    border-radius:10px;
}
.small{
    font-size:12px;
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<div id="weather" class="weather">
<div class="weather-content">
<h2 id="cuaca">Cerah</h2>
<p id="lokasi">Indonesia</p>
<div class="temp" id="suhu">32°C</div>
<small id="fb">Connecting...</small>
</div>
</div>

<div class="card">
<div id="b1" class="box" onclick="openSwitch(1)">
💡 <span id="n1">Lampu 1</span><br>
<span id="s1">OFF</span>
</div>

<div id="b2" class="box" onclick="openSwitch(2)">
💡 <span id="n2">Lampu 2</span><br>
<span id="s2">OFF</span>
</div>
</div>

</div>

<!-- SWITCH -->
<div id="switchPage" class="page">
<div id="switchBtn" class="switch" onclick="toggleSwitch()">OFF</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<h3>Settings</h3>

<input id="name1" placeholder="Nama Lampu 1">
<input id="name2" placeholder="Nama Lampu 2">

<button onclick="saveName()">Simpan</button>

<div class="small">Versi 0.3</div>
</div>

<!-- NAV -->
<div class="nav">
<span onclick="nav('home')">HOME</span>
<span onclick="nav('settings')">SETTING</span>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBugQdKa7FGb12Mg4Rm0kEC0Ngl6DhNI5E",
    databaseURL: "https://wings-smart-home-default-rtdb.asia-southeast1.firebasedatabase.app//"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// NAV
function nav(p){
    document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'))
    document.getElementById(p).classList.add('active')
}

// STATE
let currentSwitch=1;
let s1=false;
let s2=false;

// OPEN SWITCH
function openSwitch(n){
    currentSwitch=n;
    nav('switchPage');
    updateSwitch();
}

// TOGGLE
function toggleSwitch(){
    const ref = db.ref('saklar'+currentSwitch);
    ref.get().then(snap=>{
        let val = snap.val()===true;
        ref.set(!val);
    });
}

// REALTIME
db.ref('saklar1').on('value', snap=>{
    s1 = snap.val()===true;
    updateUI();
});

db.ref('saklar2').on('value', snap=>{
    s2 = snap.val()===true;
    updateUI();
});

// UPDATE UI
function updateUI(){
    document.getElementById('s1').innerText = s1?"ON":"OFF";
    document.getElementById('s2').innerText = s2?"ON":"OFF";

    document.getElementById('b1').classList.toggle('active',s1);
    document.getElementById('b2').classList.toggle('active',s2);

    updateSwitch();
}

function updateSwitch(){
    let state = currentSwitch==1 ? s1 : s2;
    let btn = document.getElementById('switchBtn');
    btn.innerText = state?"ON":"OFF";
    btn.classList.toggle('on',state);
}

// SAVE NAMA
function saveName(){
    db.ref('nama1').set(document.getElementById('name1').value);
    db.ref('nama2').set(document.getElementById('name2').value);
}

// STATUS FIREBASE
firebase.database().ref(".info/connected").on("value", snap=>{
    document.getElementById("fb").innerText =
        snap.val() ? "Firebase: Online" : "Firebase: Offline";
});

</script>

</body>
</html>
