<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wings Smart Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter;
    background:linear-gradient(180deg,#00c6ff,#0072ff);
    color:#fff;
}

/* PAGE */
.page{display:none;padding:20px}
.active{display:block}

/* WEATHER */
.weather{
    border-radius:28px;
    padding:25px;
    background-size:cover;
    position:relative;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}
.weather::after{
    content:"";
    position:absolute;inset:0;
    background:linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(0,0,0,0.6));
}
.weather-content{position:relative;z-index:2}
.temp{font-size:52px;font-weight:700}

/* CARD */
.card{display:flex;gap:15px;margin-top:25px}
.box{
    flex:1;
    padding:25px;
    border-radius:22px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    text-align:center;
    transition:.25s;
}
.box:active{transform:scale(0.95)}
.box.active{
    background:#fff;
    color:#000;
}

/* SWITCH */
.switch{
    width:170px;height:170px;
    border-radius:50%;
    margin:120px auto;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;
    background:#0a0f1c;
    transition:.3s;
}
.switch.on{
    color:#0ff;
    box-shadow:
        0 0 20px #00f7ff,
        0 0 60px #00f7ff,
        inset 0 0 20px #00f7ff;
}

/* STATUS */
.status{
    text-align:center;
    margin-top:-80px;
    opacity:0.8;
}

/* NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:15px;
    background:rgba(0,0,0,0.3);
    backdrop-filter:blur(10px);
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    border:none;
}
button{
    padding:12px;
    border:none;
    border-radius:12px;
    background:#fff;
}
.small{font-size:12px;text-align:center;margin-top:20px}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<div id="weather" class="weather">
<div class="weather-content">
<h2 id="cuaca">🌤️ ...</h2>
<p id="lokasi"></p>
<div class="temp" id="suhu"></div>
<small id="fbStatus">Connecting...</small>
</div>
</div>

<div class="card">
<div id="b1" class="box" onclick="openSwitch(1)">
💡 <span id="n1">Lampu 1</span><br>
<span id="s1">OFF</span>
</div>

<div id="b2" class="box" onclick="openSwitch(2)">
💡 <span id="n2">Lampu 2</span><br>
<span id="s2">OFF</span>
</div>
</div>

</div>

<!-- SWITCH -->
<div id="switchPage" class="page">
<div id="switchBtn" class="switch" onclick="toggleSwitch()">OFF</div>
<div class="status">Tap untuk ON/OFF</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<h3>Settings</h3>

<input id="name1" placeholder="Nama Lampu 1">
<input id="name2" placeholder="Nama Lampu 2">

<button onclick="saveName()">Simpan</button>

<div class="small">Versi 0.2</div>
</div>

<!-- NAV -->
<div class="nav">
<span onclick="nav('home')">HOME</span>
<span onclick="nav('settings')">SETTING</span>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBugQdKa7FGb12Mg4Rm0kEC0Ngl6DhNI5E",
    databaseURL:https://wings-smart-home-default-rtdb.asia-southeast1.firebasedatabase.app//"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// ===== NAV =====
function nav(p){
    document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'))
    document.getElementById(p).classList.add('active')
}


// ===== STATE =====
let currentSwitch = 1;
let s1=false, s2=false;


// ===== OPEN SWITCH =====
function openSwitch(n){
    currentSwitch = n;
    nav('switchPage');
    updateSwitchUI();
}


// ===== TOGGLE =====
function toggleSwitch(){
    const ref = db.ref('saklar'+currentSwitch);
    ref.set(currentSwitch==1 ? !s1 : !s2);
}


// ===== REALTIME LISTENER =====
db.ref('saklar1').on('value', snap=>{
    s1 = snap.val()===true;
    updateHomeUI();
});

db.ref('saklar2').on('value', snap=>{
    s2 = snap.val()===true;
    updateHomeUI();
});


// ===== NAMA =====
db.ref('/').on('value', snap=>{
    const d = snap.val()||{};
    document.getElementById('n1').innerText = d.nama1 || "Lampu 1";
    document.getElementById('n2').innerText = d.nama2 || "Lampu 2";
});


// ===== UPDATE UI =====
function updateHomeUI(){
    document.getElementById('s1').innerText = s1?"ON":"OFF";
    document.getElementById('s2').innerText = s2?"ON":"OFF";

    document.getElementById('b1').classList.toggle('active',s1);
    document.getElementById('b2').classList.toggle('active',s2);

    updateSwitchUI();
}

function updateSwitchUI(){
    let state = currentSwitch==1 ? s1 : s2;
    let btn = document.getElementById('switchBtn');
    btn.innerText = state?"ON":"OFF";
    btn.classList.toggle('on',state);
}


// ===== SAVE NAME =====
function saveName(){
    db.ref('nama1').set(document.getElementById('name1').value);
    db.ref('nama2').set(document.getElementById('name2').value);
}


// ===== STATUS FIREBASE =====
firebase.database().ref(".info/connected").on("value", snap=>{
    document.getElementById('fbStatus').innerText =
        snap.val() ? "Firebase: Online" : "Firebase: Offline";
});


// ===== CUACA =====
navigator.geolocation.getCurrentPosition(pos=>{
    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;

    let api="https://api.openweathermap.org/data/2.5/weather?lat="+lat+"&lon="+lon+"&appid=APIKEY&units=metric";

    fetch(api)
    .then(r=>r.json())
    .then(d=>{
        let w=d.weather[0].main.toLowerCase();
        let icon="🌤️";

        if(w.includes('cloud')) icon="☁️";
        if(w.includes('rain')) icon="🌧️";
        if(w.includes('clear')) icon="☀️";

        document.getElementById('cuaca').innerText = icon+" "+d.weather[0].main;
        document.getElementById('suhu').innerText = Math.round(d.main.temp)+'°C';
        document.getElementById('lokasi').innerText = d.name;

        let img="";
        if(w.includes('clear')) img="https://images.unsplash.com/photo-1502082553048";
        else if(w.includes('cloud')) img="https://images.unsplash.com/photo-1499346030926";
        else if(w.includes('rain')) img="https://images.unsplash.com/photo-1501696461415";

        document.getElementById('weather').style.backgroundImage=`url(${img})`;
    })
});

</script>

</body>
</html>
