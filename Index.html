<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wings Smart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0a0f1c;
    color:#fff;
}

.container{
    padding:20px;
    max-width:500px;
    margin:auto;
}

/* WEATHER */
.weather{
    border-radius:28px;
    padding:25px;
    background-size:cover;
    background-position:center;
    position:relative;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.weather::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(0,0,0,0.6));
}

.weather-content{
    position:relative;
    z-index:2;
}

.temp{
    font-size:52px;
    font-weight:700;
}

/* CARD */
.card{
    margin-top:25px;
    display:flex;
    gap:15px;
}

.box{
    flex:1;
    padding:22px;
    border-radius:22px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    text-align:center;
    transition:.3s;
    cursor:pointer;
}

.box.active{
    background:linear-gradient(135deg,#38bdf8,#67e8f9);
    color:#000;
}

/* NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    padding:15px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}
</style>
</head>

<body>

<div class="container">

    <!-- WEATHER -->
    <div id="weather" class="weather">
        <div class="weather-content">
            <h2 id="cuaca">Cerah</h2>
            <p>Indonesia</p>
            <div class="temp" id="suhu">32°C</div>
            <small id="statusFirebase">Connecting...</small>
        </div>
    </div>

    <!-- LAMPU -->
    <div class="card">
        <div id="l1" class="box" onclick="toggle(1)">
            <h3>💡 Lampu 1</h3>
            <p id="s1">OFF</p>
        </div>

        <div id="l2" class="box" onclick="toggle(2)">
            <h3>💡 Lampu 2</h3>
            <p id="s2">OFF</p>
        </div>
    </div>

</div>

<div class="nav">
    <span>HOME</span>
    <span>SMART</span>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>

// 🔥 CONFIG (SUDAH DIISI CONTOH FORMAT BENAR)
const firebaseConfig = {
    apiKey: "AIzaSyAbCdEfExampleKey123456",  
    databaseURL: "https://wings-smart-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// ===== STATUS KONEKSI =====
firebase.database().ref(".info/connected").on("value", snap => {
    document.getElementById("statusFirebase").innerText =
        snap.val() ? "Firebase: Online" : "Firebase: Offline";
});


// ===== REALTIME UPDATE =====
db.ref('/').on('value', snap => {
    const d = snap.val() || {};

    updateLamp(1, d.saklar1 === true);
    updateLamp(2, d.saklar2 === true);
});


// ===== TOGGLE =====
function toggle(n){
    const ref = db.ref('saklar' + n);

    ref.once('value').then(snap => {
        const val = snap.val() === true;
        ref.set(!val);
    });
}


// ===== UPDATE UI =====
function updateLamp(n, state){
    document.getElementById("s"+n).innerText = state ? "ON" : "OFF";
    document.getElementById("l"+n).classList.toggle("active", state);
}


// ===== BACKGROUND CUACA =====
function setWeatherBg(cond){
    let img="";

    if(cond.includes("cerah")){
        img="https://images.unsplash.com/photo-1502082553048-f009c37129b9";
    }else if(cond.includes("hujan")){
        img="https://images.unsplash.com/photo-1501696461415-6bd6660c6742";
    }else if(cond.includes("berawan")){
        img="https://images.unsplash.com/photo-1499346030926-9a72daac6c63";
    }else{
        img="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee";
    }

    document.getElementById("weather").style.backgroundImage=`url(${img})`;
}


// ===== LOAD CUACA =====
let kondisi = "Cerah Berawan";
document.getElementById("cuaca").innerText = kondisi;
setWeatherBg(kondisi.toLowerCase());

</script>

</body>
</html>
