<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wings Smart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter;
    background:linear-gradient(180deg,#00c6ff,#0072ff);
    color:#fff;
}

/* PAGE */
.page{display:none;padding:20px}
.active{display:block}

/* WEATHER */
.weather{
    border-radius:25px;
    padding:20px;
    position:relative;
    overflow:hidden;
    height:180px;
}
.weather-bg{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    transition:1s;
}
.weather::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.3);
    pointer-events:none;
}
.weather-content{position:relative;z-index:2}
.temp{font-size:45px;font-weight:700}

/* ANIMASI HUJAN */
.rain{
    position:absolute;
    inset:0;
    pointer-events:none;
}
.drop{
    position:absolute;
    width:2px;
    height:15px;
    background:#fff;
    opacity:0.6;
    animation:fall linear infinite;
}
@keyframes fall{
    to{transform:translateY(200px)}
}

/* CARD */
.card{display:flex;gap:15px;margin-top:20px}
.box{
    flex:1;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    text-align:center;
    cursor:pointer;
}
.box.active{background:#fff;color:#000}

/* SWITCH */
.switch{
    width:170px;height:170px;
    border-radius:50%;
    margin:120px auto;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;
    background:#0a0f1c;
}
.switch.on{
    color:#0ff;
    box-shadow:0 0 40px #00f7ff,0 0 80px #00f7ff;
}

/* NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:rgba(0,0,0,0.3);
    padding:15px;
}

/* INPUT */
input{width:100%;padding:10px;margin:10px 0;border-radius:10px;border:none}
button{padding:10px;border:none;border-radius:10px}
.small{text-align:center;font-size:12px;margin-top:20px}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<div class="weather" id="weather">
<div class="weather-bg" id="weatherBg"></div>
<div class="rain" id="rain"></div>

<div class="weather-content">
<h2 id="cuaca">Loading...</h2>
<p id="lokasi">Indonesia</p>
<div class="temp" id="suhu">--°C</div>
</div>
</div>

<div class="card">
<div id="b1" class="box" onclick="openSwitch(1)">
💡 Lampu 1<br><span id="s1">OFF</span>
</div>
<div id="b2" class="box" onclick="openSwitch(2)">
💡 Lampu 2<br><span id="s2">OFF</span>
</div>
</div>

</div>

<!-- SWITCH -->
<div id="switchPage" class="page">
<div id="switchBtn" class="switch" onclick="toggleSwitch()">OFF</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<h3>Settings</h3>
<input id="name1" placeholder="Nama Lampu 1">
<input id="name2" placeholder="Nama Lampu 2">
<button onclick="saveName()">Simpan</button>
<div class="small">Versi 1.0</div>
</div>

<!-- NAV -->
<div class="nav">
<span onclick="nav('home')">HOME</span>
<span onclick="nav('settings')">SETTING</span>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>
// ===== FIREBASE =====
const firebaseConfig = {
    apiKey: "AIzaSyBugQdKa7FGb12Mg4Rm0kEC0Ngl6DhNI5E",
    databaseURL: "https://wings-smart-home-default-rtdb.asia-southeast1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// NAV
function nav(p){
    document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'))
    document.getElementById(p).classList.add('active')
}

// SWITCH
let current=1, s1=false, s2=false;

function openSwitch(n){
    current=n;
    nav('switchPage');
    updateSwitch();
}

function toggleSwitch(){
    let ref=db.ref('saklar'+current);
    ref.get().then(s=>ref.set(!(s.val()===true)));
}

db.ref('saklar1').on('value',s=>{s1=s.val()===true;updateUI();});
db.ref('saklar2').on('value',s=>{s2=s.val()===true;updateUI();});

function updateUI(){
    document.getElementById('s1').innerText=s1?"ON":"OFF";
    document.getElementById('s2').innerText=s2?"ON":"OFF";
    document.getElementById('b1').classList.toggle('active',s1);
    document.getElementById('b2').classList.toggle('active',s2);
    updateSwitch();
}

function updateSwitch(){
    let st=current==1?s1:s2;
    let btn=document.getElementById('switchBtn');
    btn.innerText=st?"ON":"OFF";
    btn.classList.toggle('on',st);
}

// ===== CUACA ANIMASI =====
function setWeather(){

    let jam=new Date().getHours();
    let bg="",text="",rain=false;

    if(jam>=6 && jam<12){
        bg="https://images.unsplash.com/photo-1502082553048";
        text="☀️ Cerah";
    }
    else if(jam>=12 && jam<17){
        bg="https://images.unsplash.com/photo-1507525428034";
        text="🌤️ Siang";
    }
    else if(jam>=17 && jam<19){
        bg="https://images.unsplash.com/photo-1499346030926";
        text="🌇 Sore";
    }
    else{
        bg="https://images.unsplash.com/photo-1500530855697";
        text="🌙 Malam";
    }

    // random hujan
    if(Math.random()>0.7){
        text="🌧️ Hujan";
        bg="https://images.unsplash.com/photo-1501696461415";
        rain=true;
    }

    document.getElementById("cuaca").innerText=text;
    document.getElementById("weatherBg").style.backgroundImage=`url(${bg})`;

    if(rain) createRain();
}

// HUJAN
function createRain(){
    let rain=document.getElementById("rain");
    for(let i=0;i<40;i++){
        let d=document.createElement("div");
        d.className="drop";
        d.style.left=Math.random()*100+"%";
        d.style.animationDuration=(0.5+Math.random())+"s";
        rain.appendChild(d);
    }
}

setWeather();

</script>

</body>
</html>
