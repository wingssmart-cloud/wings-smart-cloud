<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Wings Smart - Global Cloud</title>
    
    <!-- Ikon & Mode Aplikasi Full Screen -->
    <link rel="icon" href="https://flaticon.com">
    <link rel="apple-touch-icon" href="https://flaticon.com">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #0f172a; margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; color: #fff; overflow-x: hidden; }
        .bg { position: fixed; width: 200%; height: 200%; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); animation: rotate 20s linear infinite; z-index: -1; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .container { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 30px; padding: 30px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 20px; }
        h2 { font-weight: 300; letter-spacing: 5px; margin: 0; }
        .status { color: #38bdf8; font-size: 10px; margin-bottom: 30px; letter-spacing: 2px; }
        .btn { width: 100%; padding: 22px; margin: 12px 0; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #94a3b8; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.4s; }
        .btn.active { background: #38bdf8; color: #fff; box-shadow: 0 0 25px rgba(56,189,248,0.4); border: none; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box; font-size: 14px; }
        .nav { position: fixed; bottom: 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); display: flex; border-radius: 25px; padding: 6px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .nav div { padding: 12px 25px; cursor: pointer; border-radius: 20px; font-size: 14px; transition: 0.3s; font-weight: bold; }
        .nav .act { background: #38bdf8; color: #fff; }
    </style>
</head>
<body>
    <div class="bg"></div>

    <!-- Halaman Beranda -->
    <div id="p_home" class="container">
        <div class="glass">
            <h2>WINGS</h2>
            <div class="status">CLOUD SYSTEM ONLINE</div>
            <button id="s1" class="btn" onclick="toggle(1)">Loading...</button>
            <button id="s2" class="btn" onclick="toggle(2)">Loading...</button>
        </div>
    </div>

    <!-- Halaman Pengaturan (Saya) -->
    <div id="p_set" class="container" style="display:none;">
        <div class="glass">
            <h3>PENGATURAN</h3>
            <p style="font-size: 12px; color: #94a3b8; margin-bottom: 20px;">Sesuaikan Nama Saklar Anda</p>
            <input id="n1" type="text" placeholder="Nama Lampu 1">
            <input id="n2" type="text" placeholder="Nama Lampu 2">
            <button class="btn active" onclick="saveNames()" style="padding: 15px; margin-top: 20px;">SIMPAN PERUBAHAN</button>
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <center>
        <div class="nav">
            <div id="m_home" class="act" onclick="show('home')">BERANDA</div>
            <div id="m_set" onclick="show('set')">SAYA</div>
        </div>
    </center>

    <script>
        // Konfigurasi Firebase
        const conf = { databaseURL: "https://firebasedatabase.app" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        // Ambil Data Real-time (Status & Nama)
        db.ref('/').on('value', (s) => {
            const d = s.val() || {};
            const name1 = d.nama1 || "Lampu Utama";
            const name2 = d.nama2 || "Lampu Teras";
            
            document.getElementById('s1').innerText = name1 + (d.saklar1 ? " : ON" : " : OFF");
            document.getElementById('s2').innerText = name2 + (d.saklar2 ? " : ON" : " : OFF");
            document.getElementById('s1').className = d.saklar1 ? "btn active" : "btn";
            document.getElementById('s2').className = d.saklar2 ? "btn active" : "btn";
            
            if(!document.activeElement.tagName.includes('INPUT')) {
                document.getElementById('n1').value = d.nama1 || "";
                document.getElementById('n2').value = d.nama2 || "";
            }
        });

        function toggle(n) {
            const r = db.ref('saklar' + n);
            r.once('value').then(s => r.set(!s.val()));
        }

        function saveNames() {
            const val1 = document.getElementById('n1').value;
            const val2 = document.getElementById('n2').value;
            db.ref('nama1').set(val1);
            db.ref('nama2').set(val2);
            alert("Nama Berhasil Disimpan!");
            show('home');
        }

        function show(p) {
            document.getElementById('p_home').style.display = p=='home'?'flex':'none';
            document.getElementById('p_set').style.display = p=='set'?'flex':'none';
            document.getElementById('m_home').className = p=='home'?'act':'';
            document.getElementById('m_set').className = p=='set'?'act':'';
        }
    </script>
</body>
</html>
